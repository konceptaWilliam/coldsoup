name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web — typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      # Root workspace install covers apps/web + packages/*.
      - run: npm ci
      - run: npm run typecheck --workspace=apps/web
      - run: npm run lint --workspace=apps/web
      - run: npm run test --workspace=apps/web

  # Mobile (apps/mobile) is not in active use — its typecheck is disabled.
  # It currently fails because mobile's tsc also checks ../web/lib/trpc source,
  # whose deps (zod, @trpc/server, superjson, resend) aren't in apps/mobile.
  # Re-enable once mobile resumes and the cross-package type resolution is fixed.
